name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci
        env:
          CI: true
          REACT_APP_SUPABASE_URL: https://placeholder.supabase.co
          REACT_APP_SUPABASE_ANON_KEY: placeholder-anon-key-for-ci

      - name: Build
        run: npm run build
        env:
          REACT_APP_SUPABASE_URL: https://placeholder.supabase.co
          REACT_APP_SUPABASE_ANON_KEY: placeholder-anon-key-for-ci
